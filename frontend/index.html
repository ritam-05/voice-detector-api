<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detect whether a voice is real or AI-generated. Upload an audio file and get instant results.">
    <title>VoiceGuard — Real or AI?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Ambient background -->
    <div class="bg-glow"></div>
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Main App -->
    <main class="app">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </div>
            <span class="brand-name">VoiceGuard</span>
        </div>

        <!-- Headline -->
        <h1 class="headline">
            Is that voice <span class="gradient-text">real</span> or <span class="gradient-text-alt">AI</span>?
        </h1>
        <p class="tagline">Upload an audio clip and find out instantly.</p>

        <!-- API Config (collapsed) -->
        <div class="api-bar">
            <button class="api-toggle" id="apiToggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </button>
            <div class="api-panel hidden" id="apiPanel">
                <div class="api-row">
                    <input type="url" id="apiUrlInput" class="api-input" value="https://ritam-05-voice-detector-api.hf.space" placeholder="https://your-api.example.com">
                    <button class="api-check" id="apiCheckBtn" title="Test connection">Test</button>
                </div>
                <div class="api-status" id="apiStatus"></div>
            </div>
        </div>

        <!-- Detector Card -->
        <div class="card" id="detectorCard">

            <!-- Upload Zone -->
            <div class="upload-zone" id="uploadZone">
                <div class="upload-ring">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="upload-label">Drop audio file here or <span class="upload-browse">browse</span></p>
                <p class="upload-hint">WAV · MP3 · FLAC · OGG</p>
                <input type="file" id="fileInput" accept="audio/*,video/mp4,.wav,.mp3,.flac,.ogg,.m4a,.aac,.wma,.opus,.mp4" hidden>
            </div>

            <!-- File Preview (hidden by default) -->
            <div class="file-bar hidden" id="fileBar">
                <div class="file-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                        <path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                    </svg>
                </div>
                <div class="file-meta">
                    <span class="file-name" id="fileName"></span>
                    <span class="file-size" id="fileSize"></span>
                </div>
                <button class="file-remove" id="fileRemove" title="Remove">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <audio id="audioPlayer" class="audio-player hidden" controls></audio>

            <!-- Analyze button -->
            <button class="btn-analyze hidden" id="analyzeBtn">
                <span class="btn-text">Analyze Voice</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
                </svg>
            </button>

            <!-- Loading -->
            <div class="loader hidden" id="loader">
                <div class="loader-pulse"></div>
                <p class="loader-text">Analyzing your audio<span class="dots"></span></p>
            </div>

            <!-- Result -->
            <div class="result hidden" id="result">
                <div class="result-badge" id="resultBadge">
                    <span class="result-emoji" id="resultEmoji"></span>
                </div>
                <h2 class="result-label" id="resultLabel"></h2>

                <!-- Text Explanation -->
                <div class="result-explanation" id="resultExplanation"></div>

                <button class="btn-again" id="resetBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <polyline points="1 4 1 10 7 10"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    Try Another
                </button>
            </div>
        </div>

        <p class="footer-note">Upload stays private — audio is processed and immediately discarded.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
